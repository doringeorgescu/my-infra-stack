version: '3.8'

services:
  
  web-site:
    image: site-custom:v2
    container_name: nginx-web
    ports:
      - "80:80"
    restart: always

 
  prometheus:
    image: monitor-prometheus:latest 
    container_name: prometheus
    
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    restart: always
  
  node-exporter:
    image: monitor-node-exporter:v1
    container_name: node-exporter
    
    ports:
      - "9100:9100"
    volumes:
      - "/proc:/host/proc:ro"
      - "/sys:/host/sys:ro"
      - "/:/rootfs:ro"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)'
    restart: always

  
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_storage:/var/lib/grafana
    restart: always

volumes:
  prometheus_data:
  grafana_storage:
