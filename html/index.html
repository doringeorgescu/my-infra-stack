<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proiectul Meu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1a1a1a;
            color: white;
            margin: 0;
        }
        .card {
            text-align: center;
            padding: 2rem;
            border: 2px solid #333;
            border-radius: 15px;
            background: #222;
        }
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            background: #00ff88;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            transition: transform 0.1s;
        }
        /* Efectul de "bâzâit" (vibrate) la hover */
        button:hover {
            animation: buzz 0.1s infinite;
        }
        @keyframes buzz {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-1deg); }
            50% { transform: translate(-3px, 0px) rotate(1deg); }
            80% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -1px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Salut! 👋</h1>
        <p>Ăsta e site-ul tău static ultra-rapid.</p>
        <button onclick="alert('Bzzzt! Funcționează!')">APASĂ-MĂ</button>
    </div>

</body>
</html>
